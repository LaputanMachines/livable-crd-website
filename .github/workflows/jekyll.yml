name: Deploy Jekyll site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    # Build + deploy logic lives in the reusable workflow so the daily candidate
    # sync (sync-candidates.yml) deploys through the exact same path.
    uses: ./.github/workflows/deploy.yml
