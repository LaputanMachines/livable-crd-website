# Questionnaire topics (matches coalition form)
# `short` is the compact label used in scorecard table column headers.
# `example` is a sample question voters might see for that topic — shown in the
# "What each category covers" FAQ on the scorecard page.
- id: general
  name: All categories / General
  short: General
  icon: general.svg
  accent: "#5b5169"
  description: >-
    Cross-cutting questions that apply across topics or address overall vision for
    livability in the Capital Region.
  example: >-
    What is your overall vision for a more livable Capital Region, and how would you
    balance competing priorities?

- id: transit
  name: Transit
  short: Transit
  icon: transit.svg
  accent: "#3730a3"
  description: >-
    Public transit service, funding, and integration so more people can get around
    without driving for every trip.
  example: >-
    Would you support increasing municipal investment in frequent, all-day transit
    service?

- id: housing
  name: Housing
  short: Housing
  icon: housing.svg
  accent: "#5c18a4"
  description: >-
    Affordable and diverse homes, gentle density, tenant protections, and land-use
    choices that help people of all incomes live here.
  example: >-
    Will you vote to allow more diverse, affordable housing types in established
    neighbourhoods?

- id: climate
  name: Climate
  short: Climate
  icon: climate.svg
  accent: "#7e22ce"
  description: >-
    Climate action, emissions reduction, resilience, and aligning growth with a
    sustainable future.
  example: >-
    What concrete steps would you take to cut your municipality's greenhouse gas
    emissions?

- id: arts
  name: Arts
  short: Arts
  icon: arts.svg
  accent: "#a21caf"
  description: >-
    Creative spaces, cultural programming, and municipal support for arts and
    culture in everyday community life.
  example: >-
    Would you protect or expand municipal funding for arts spaces and cultural
    programming?

- id: rolling-cycling
  name: Rolling & cycling
  short: Cycling
  icon: rolling-cycling.svg
  accent: "#4f46e5"
  description: >-
    Safe bike lanes, rolling infrastructure, and policies that make cycling and
    wheeled mobility practical for more residents.
  example: >-
    Do you support building a connected network of protected bike and rolling
    routes?

- id: walking
  name: Walking
  short: Walking
  icon: walking.svg
  accent: "#9333ea"
  description: >-
    Walkable neighbourhoods, sidewalks, crossings, and street design that put
    people first on foot.
  example: >-
    Will you prioritize sidewalks, safe crossings, and pedestrian-first street
    design?

- id: youth-students
  name: Youth / students
  short: Youth
  icon: youth-students.svg
  accent: "#6d28d9"
  description: >-
    Schools, youth services, student housing, and decisions that affect young
    people staying and thriving in the region.
  example: >-
    How would you expand housing, services, and opportunities for youth and
    students?

- id: healthcare-access
  name: Healthcare access
  short: Health
  icon: healthcare-access.svg
  accent: "#be185d"
  description: >-
    Access to clinics, mental health supports, and municipal actions that help
    residents get timely care close to home.
  example: >-
    What municipal actions would you take to improve residents' access to
    healthcare?

- id: reconciliation
  name: Reconciliation
  short: Reconciliation
  icon: reconciliation.svg
  accent: "#4c1d95"
  description: >-
    Advancing reconciliation with Indigenous peoples through respectful
    relationships, honouring commitments, and decisions made in partnership with
    local First Nations.
  example: >-
    How would you work in partnership with local First Nations to advance
    reconciliation in your municipality?
