# Confirmed municipal election candidates, grouped by municipality.
#
# Source: coalition candidate-tracking sheet. This file includes ONLY candidates
# whose status is confirmed ("Yes Confirmed") as running. Suspected, declined,
# and unconfirmed entries are intentionally omitted until confirmed.
#
# Subjective tracking notes (political "vibe", commentary, character assessments)
# are intentionally NOT published here — the scorecard evaluates positions, not
# people. Only factual public-record fields are stored.
#
# Fields:
#   name         Candidate's name as listed.
#   municipality Slug matching _data/municipalities.yml.
#   office       Office sought, or null if not yet specified in the source.
#   incumbent    true = incumbent, false = challenger, null = unspecified.
#   scores       Map of per-topic letter grades, keyed by the topic ids in
#                _data/subjects.yml. Any topic left out renders as pending ("—").
#
# Grades are pending until candidates are surveyed (see methodology). To publish a
# candidate's results, add a `scores` map, e.g.:
#
#   - name: Example Candidate
#     municipality: victoria
#     office: Councillor
#     incumbent: false
#     scores:
#       general: B
#       transit: A
#       housing: B
#       climate: A
#       arts: C
#       rolling-cycling: B
#       walking: A
#       youth-students: C
#       healthcare-access: B

