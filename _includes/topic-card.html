{% assign topic = include.subject %}
<article class="card card--topic" style="--card-accent: {{ topic.accent }}">
  <img class="card-icon" src="{{ '/assets/images/icons/' | append: topic.icon | relative_url }}" alt="" width="32" height="32">
  <h3>{{ topic.name }}</h3>
  <p>{{ topic.description }}</p>
</article>
