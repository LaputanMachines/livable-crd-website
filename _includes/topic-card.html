{% assign topic = include.subject %}
<article class="card card--topic" style="--card-accent: {{ topic.accent }}">
  <span class="card-icon" aria-hidden="true">{{ topic.icon }}</span>
  <h3>{{ topic.name }}</h3>
  <p>{{ topic.description }}</p>
  <a class="card-link" href="{{ '/methodology/' | relative_url }}">Learn more <span aria-hidden="true">→</span></a>
</article>
