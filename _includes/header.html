<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/logo-placeholder.svg' | relative_url }}" alt="" width="40" height="40">
      <span>{{ site.title }}</span>
    </a>
    <div class="site-nav-wrap">
      <input type="checkbox" id="nav-toggle" class="nav-toggle-input" aria-hidden="true" tabindex="-1">
      <label for="nav-toggle" class="nav-menu-toggle">
        <span class="sr-only">Menu</span>
        <span class="nav-menu-icon" aria-hidden="true"></span>
      </label>
      <nav aria-label="Main" class="site-nav-panel" id="site-nav">
        <ul class="site-nav">
          {% assign current = page.url %}
          <li><a href="{{ '/' | relative_url }}" {% if current == '/' %}class="active"{% endif %}>Home</a></li>
          <li><a href="{{ '/scorecard/' | relative_url }}" class="nav-highlight{% if current contains '/scorecard' %} active{% endif %}">Scorecard</a></li>
          <li><a href="{{ '/about/' | relative_url }}" {% if current == '/about/' %}class="active"{% endif %}>About</a></li>
          <li><a href="{{ '/methodology/' | relative_url }}" {% if current == '/methodology/' %}class="active"{% endif %}>Methodology</a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>
