title: Livable CRD
description: >-
  A coalition scorecard for Capital Regional District municipal election
  candidates on transit, housing, arts, climate, and related livability topics.
url: "https://livablecrd.ca"
baseurl: ""
email: hello@livablecrd.ca
donate_url: "https://actionnetwork.org/fundraising/support-livable-crd/"

# Action Network mailing-list form slug. This is the form NAME as it appears in
# the Action Network embed code / hosted URL (the part after /form/ in the
# widget src). Set this to the slug of the form you created, e.g. if the embed
# src is .../widgets/v5/form/livable-crd-mailing-list?..., use that final token.
signup_form_slug: "livable-crd-mailing-list"

# Feature flags
# Render coalition partner logos on the homepage. Disabled for now; the logo
# files and `logo:` entries in _data/partners.yml are kept — flip to true to
# re-enable. (Changing this requires restarting `jekyll serve`.)
partner_logos: false

# --- SEO (jekyll-seo-tag) ---
# tagline is appended to the site title on the homepage:
#   "Livable CRD | Capital Region municipal candidate scorecard"
# Kept short so the full homepage <title> stays under Google's ~60-char limit.
tagline: "Capital Region municipal candidate scorecard"
locale: en_CA
logo: /assets/images/logo.png            # publisher logo in structured data

markdown: kramdown
permalink: pretty

# jekyll-seo-tag only reads `image` from page front matter (not site-wide), and
# auto-upgrades the Twitter card to summary_large_image when an image is present.
# Inject the default social image into every page so og:image/twitter:image emit.
# Individual pages can override `image` in their own front matter.
defaults:
  - scope:
      path: ""
    values:
      image:
        path: /assets/images/og-image.png
        width: 1200
        height: 630
        alt: "Livable CRD — Capital Region municipal election candidate scorecard"
  # Blog posts: dateless URLs under /blog/ and the shared post layout.
  # This per-collection permalink overrides the global `pretty` style above.
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /blog/:title/

# jekyll-feed RSS/Atom feed. Limit the feed to actual blog posts.
feed:
  path: /feed.xml

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .github
  - scripts

sass:
  style: compressed
